<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Learning System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f5f5f3;
    --color-bg-tertiary: #eeede8;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #6b6b67;
    --color-border: rgba(0,0,0,0.12);
    --color-border-hover: rgba(0,0,0,0.22);
    --color-accent: #185FA5;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-bg-secondary: #262624;
      --color-bg-tertiary: #2e2e2c;
      --color-text-primary: #f0efe8;
      --color-text-secondary: #9a9a94;
      --color-border: rgba(255,255,255,0.10);
      --color-border-hover: rgba(255,255,255,0.20);
      --color-accent: #5b9fd8;
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--color-bg-tertiary);
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 2.5rem 1.5rem;
  }

  .container {
    max-width: 840px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 26px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: var(--color-text-secondary);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
  }

  .card {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: var(--color-border-hover); }
  .card.active { border: 1.5px solid var(--color-accent); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: var(--radius-md);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-primary);
  }

  .card-desc {
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .use-btn {
    font-size: 12px;
    color: var(--color-accent);
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-family: var(--font-sans);
  }

  .use-btn:hover { text-decoration: underline; }

  .detail {
    background: var(--color-bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    display: none;
  }

  .detail.visible { display: block; }

  .detail-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 14px;
  }

  .field { margin-bottom: 14px; }

  label.field-label {
    font-size: 12px;
    color: var(--color-text-secondary);
    display: block;
    margin-bottom: 4px;
  }

  input[type="text"] {
    width: 100%;
    font-size: 13px;
    padding: 8px 10px;
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-bg);
    color: var(--color-text-primary);
    font-family: var(--font-sans);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: var(--color-accent); }

  .prompt-box {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 12px;
    margin-top: 10px;
  }

  .prompt-label {
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-bottom: 6px;
  }

  .prompt-text {
    font-size: 13px;
    color: var(--color-text-primary);
    line-height: 1.6;
    font-style: italic;
    white-space: pre-wrap;
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .btn {
    font-size: 13px;
    padding: 8px 16px;
    border: 0.5px solid var(--color-border-hover);
    border-radius: var(--radius-md);
    background: transparent;
    color: var(--color-text-primary);
    cursor: pointer;
    font-family: var(--font-sans);
    transition: background 0.15s;
  }

  .btn:hover { background: var(--color-bg-tertiary); }

  .btn-copy-success { color: #3B6D11; border-color: #3B6D11; }

  .hint {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-top: 12px;
    line-height: 1.5;
  }

  footer {
    margin-top: 3rem;
    font-size: 12px;
    color: var(--color-text-secondary);
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Claude Learning System</h1>
    <p>Pick a mode, fill in your topic, and launch the prompt.</p>
  </header>

  <div class="grid" id="grid"></div>
  <div class="detail" id="detail">
    <p class="detail-title" id="detail-title"></p>
    <div class="field">
      <label class="field-label">Your topic</label>
      <input type="text" id="topic-input" placeholder="e.g. Make.com error handling, DSP advertising, SQL joins" />
    </div>
    <div id="extra-fields"></div>
    <div class="prompt-box">
      <p class="prompt-label">Generated prompt</p>
      <p class="prompt-text" id="prompt-preview">Fill in the topic above to see your prompt.</p>
    </div>
    <div class="actions">
      <button class="btn" id="copy-btn">Copy prompt</button>
    </div>
    <p class="hint" id="mode-hint"></p>
  </div>

  <footer>Claude Learning System &mdash; based on prompts by Colby Kultgen</footer>
</div>

<script>
const modes = [
  {
    id: "20h",
    name: "Learn in 20 hours",
    badge: "Plan",
    badgeBg: "#E6F1FB", badgeColor: "#0C447C",
    desc: "80/20 learning plan broken into 10 two-hour sessions with review checkpoints.",
    hint: "Best for: brand-new topics you need fast coverage on. Use this first.",
    extras: [],
    prompt: (t) => `I need to learn ${t} fast. Build me a 20-hour learning plan focused on the 20% of concepts that drive 80% of results. Break it into 10 two-hour sessions. For each session: list what to study, the best free resource (link if possible), and a 15-minute review exercise at the end. Assume I'm starting from scratch.`
  },
  {
    id: "cheat",
    name: "One-page cheat sheet",
    badge: "Reference",
    badgeBg: "#EAF3DE", badgeColor: "#3B6D11",
    desc: "Dense single-page summary with key concepts, diagrams, and examples.",
    hint: "Best for: quick review before using a tool or entering a meeting. Print or pin it.",
    extras: [],
    prompt: (t) => `Create a one-page cheat sheet for ${t}. Include: key concepts and their definitions, a simple diagram or mental model if applicable, common use cases, and 2–3 concrete examples. Format it so I can review everything in under 5 minutes. Use headers and bullet points — density over prose.`
  },
  {
    id: "quiz",
    name: "Quiz until I break",
    badge: "Practice",
    badgeBg: "#FAEEDA", badgeColor: "#633806",
    desc: "10 progressively harder questions. Claude grades each answer and explains gaps.",
    hint: "Best for: after you've studied. Forces you to surface what you actually don't know.",
    extras: [{ id: "level", label: "Your current level", placeholder: "e.g. beginner, have read the docs, used it once" }],
    prompt: (t, ex) => `I just studied ${t}${ex.level ? ` — my current level: ${ex.level}` : ""}. Give me 10 questions that test my understanding, starting easy and getting progressively harder. After I answer each one, grade me (correct / partially correct / incorrect), explain what I got wrong or missed, and then give me the next question. Don't give all 10 at once — ask one at a time.`
  },
  {
    id: "ladder",
    name: "Learning ladder",
    badge: "Structure",
    badgeBg: "#EEEDFE", badgeColor: "#3C3489",
    desc: "5 levels from beginner to advanced with clear milestones and transitions.",
    hint: "Best for: knowing exactly where you are and what to tackle next. Good for roadmapping.",
    extras: [],
    prompt: (t) => `Break down ${t} into 5 levels of difficulty (Level 1 = total beginner, Level 5 = advanced practitioner). For each level: describe what someone at this level knows and can do, list 3–5 specific skills or concepts to master, and describe the milestone that signals readiness to move up. Make the milestones concrete and testable, not vague.`
  },
  {
    id: "resources",
    name: "Best resources",
    badge: "Curate",
    badgeBg: "#FAECE7", badgeColor: "#712B13",
    desc: "Top 5 books, videos, courses, or people — with a reason why each is worth your time.",
    hint: "Best for: when you don't know where to start or want to cut through the noise.",
    extras: [{ id: "format", label: "Preferred format (optional)", placeholder: "e.g. video, book, hands-on, free only" }],
    prompt: (t, ex) => `List the top 5 resources for learning ${t} fast${ex.format ? ` — preference for ${ex.format}` : ""}. For each resource: name + link if available, format (book / video / course / person), why it's worth my time specifically, and how long it takes. Rank them by effectiveness, not popularity. Be direct — skip anything that's average.`
  },
  {
    id: "feynman",
    name: "Feynman technique",
    badge: "Deepen",
    badgeBg: "#FBEAF0", badgeColor: "#72243E",
    desc: "Claude explains simply, then flips it — you re-explain, Claude finds the gaps.",
    hint: "Best for: things you think you understand but can't explain clearly. Exposes hidden gaps.",
    extras: [],
    prompt: (t) => `Let's use the Feynman Technique on ${t}. Step 1: Explain it to me in the simplest possible terms, using plain language and one or two analogies. Step 2: Ask me to re-explain it back to you in my own words. Step 3: Point out exactly where my explanation breaks down, misses something, or reveals a gap in my understanding. Step 4: Re-teach just the parts I got wrong, then ask me to try again. Repeat until I can explain it clearly without prompting.`
  }
];

let activeMode = null;

function renderCards() {
  const grid = document.getElementById("grid");
  grid.innerHTML = modes.map(m => `
    <div class="card${activeMode === m.id ? " active" : ""}" onclick="selectMode('${m.id}')">
      <div class="card-header">
        <span class="badge" style="background:${m.badgeBg};color:${m.badgeColor}">${m.badge}</span>
        <span class="card-name">${m.name}</span>
      </div>
      <p class="card-desc">${m.desc}</p>
      <button class="use-btn" onclick="event.stopPropagation();selectMode('${m.id}')">Use this mode ↗</button>
    </div>
  `).join("");
}

function updatePrompt() {
  const topic = document.getElementById("topic-input").value.trim();
  const mode = modes.find(m => m.id === activeMode);
  if (!mode) return;
  const ex = {};
  mode.extras.forEach(e => {
    const el = document.getElementById("extra-" + e.id);
    ex[e.id] = el ? el.value : "";
  });
  const prompt = topic ? mode.prompt(topic, ex) : "Fill in the topic above to see your prompt.";
  document.getElementById("prompt-preview").textContent = prompt;
}

function selectMode(id) {
  activeMode = id;
  renderCards();
  const mode = modes.find(m => m.id === id);
  const detail = document.getElementById("detail");
  detail.classList.add("visible");
  document.getElementById("detail-title").textContent = mode.name;
  document.getElementById("mode-hint").textContent = mode.hint;
  const extraFields = document.getElementById("extra-fields");
  extraFields.innerHTML = mode.extras.map(e => `
    <div class="field">
      <label class="field-label">${e.label}</label>
      <input type="text" id="extra-${e.id}" placeholder="${e.placeholder}" oninput="updatePrompt()" />
    </div>
  `).join("");
  document.getElementById("topic-input").value = "";
  document.getElementById("prompt-preview").textContent = "Fill in the topic above to see your prompt.";
  detail.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

document.getElementById("topic-input").addEventListener("input", updatePrompt);

document.getElementById("copy-btn").addEventListener("click", () => {
  const text = document.getElementById("prompt-preview").textContent;
  if (!text || text === "Fill in the topic above to see your prompt.") return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "Copied ✓";
    btn.classList.add("btn-copy-success");
    setTimeout(() => {
      btn.textContent = "Copy prompt";
      btn.classList.remove("btn-copy-success");
    }, 1500);
  });
});

renderCards();
</script>
</body>
</html>
